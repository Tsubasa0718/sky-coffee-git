<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     
    <meta property="og:type" content="website">
     <meta property="og:title" content="Sky Coffee">
     <meta property="og:url" content="https://skycoffee.netlify.app/">
     <meta property="og:description" content="Sky Coffee - 都心の喧騒を忘れさせる穏やかな時間と空間。高品質のコーヒーと手作りスイーーツが自慢のおしゃれなカフェ。
     無料Wi-Fi完備で仕事や勉強にも最適。毎月変わる限定メニューもお楽しみに">
     <meta property="og:imag" content="https://skycoffee.netlify.app/img/OGP.png">
     <!-- ogp -->
     <meta name="description" content="Sky Coffee - 都心の喧騒を忘れさせる穏やかな時間と空間。高品質のコーヒーと手作りスイーツが自慢のおしゃれなカフェ。無料Wi-Fi完備で仕事や勉強にも最適。毎月変わる限定メニューもお楽しみに。">
    <title>Sky Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <!-- css -->
    <link rel="icon" href="./img/favicon.ico">
</head>
<body>
    
    <header class="header">
        <h1 class="header__logo">
            <a href="#">
                <img src="./img/logo.svg" alt="Sky Coffeeロゴ">
            </a>
        </h1>
    </header>
    <div class="mv">
       <picture>
        <source media="(max-width: 768px)" srcset="./img/main-visual-sp.jpg">
        <img src="./img/main-visual-pc.jpg" alt="複数の青いコーヒーカップ">
       </picture>
    </div>
    <!-- mainvidual -->
    <nav class="global-nav">
        <ul class="global-nav__list">
            <li class="global-nav__item"><a href="#">menu</a></li>
            <li class="global-nav__item"><a href="#">blog</a></li>
            <li class="global-nav__item"><a href="#">access</a></li>
        </ul>
    </nav>
    <!-- glabalnav -->
    <main class="content main">
        <section class="concept">
            <div class="container">
                <div class="concept__wrapper">
                    <div class="concept__image">
                        <img src="./img/concept.jpg" alt="青いカップのコーヒー">
                    </div>
                    <div class="concept__desc">
                        <div class="concept__title">concept</div>
                        <h2 class="concept__head">心静かにコーヒーを</h2>
                        <div class="concept__text">
                            <p>
                                立ち止まって、 <br>
                                空の青さを眺めて、<br>
                                一息つきましょう
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- concept -->
        <section class="blog">
          <div class="container">
             <h2 class="blog__head">blog<span class="blog__subhead">ブログ</span></h2>
             <div class="blog__list">
                <div class="blog__item">
                    <a href="#">
                     <div class="blog__image">
                         <img src="./img/thumbnail01.jpg" alt="青いトラック">
                     </div>
                     <div class="blog__title">コーヒーカー始めました。</div>
                     <time>2030.08.08</time>
                    </a>
                </div>
                <div class="blog__item">
                    <a href="#">
                     <div class="blog__image">
                         <img src="./img/thumbnail02.jpg" alt="牛乳">
                     </div>
                     <div class="blog__title">濃厚クリーミーなミルクをどうぞ</div>
                     <time>2030.08.05</time>
                    </a>
                </div>
                <div class="blog__item">
                    <a href="#">
                     <div class="blog__image">
                         <img src="./img/thumbnail03.jpg" alt="音楽アプリ">
                     </div>
                     <div class="blog__title">Sky Coffeeのオリジナル曲が完成！無料ダウン
                        ロード可能です。
                    </div>
                     <time>2030.08.02</time>
                    </a>
                </div>
                <div class="blog__item">
                    <a href="#">
                     <div class="blog__image">
                         <img src="./img/thumbnail04.jpg" alt="山々">
                     </div>
                     <div class="blog__title">ハイキング用のコーヒーを販売中です。</div>
                     <time>2030.07.28</time>
                    </a>
                </div>
                <div class="blog__item">
                    <a href="#">
                     <div class="blog__image">
                         <img src="./img/thumbnail05.jpg" alt="青とピンクのグラデーション">
                     </div>
                     <div class="blog__title">ショップの壁を塗ってみました。</div>
                     <time>2030.07.27</time>
                    </a>
                </div>
                <div class="blog__item">
                    <a href="#">
                     <div class="blog__image">
                         <img src="./img/thumbnail06.jpg" alt="コーヒーと手紙">
                     </div>
                     <div class="blog__title">ブログ始めました</div>
                     <time>2030.07.26</time>
                    </a>
                </div>
             </div>
             
          <a class="btn" href="#">ブログ一覧</a>
        </div>
        </section>
        <!-- blog -->
    </main>
    <footer class="footer">
     <div class="footer__logo"><img src="./img/logo-white.svg" alt="Sky Coffee ロゴ"></div>
    <div class="footer__copy">
        <small>
            ©Sky Coffee
         </small>
    </div>
     <div class="footer__link">
        <small><a href="https://webdesigner-go.com/coding-practice/">無料コーディング練習所</a></small>
     </div>
    </footer>
</body>
</html>
